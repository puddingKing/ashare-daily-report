<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A 股每日分析报告</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>A 股每日分析报告</h1>
        <p class="subtitle">每日 8:00 自动采集大盘数据并生成分析</p>
      </div>
      <button id="refreshBtn" class="btn">刷新列表</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h2>历史报告</h2>
        <ul id="reportList" class="report-list"></ul>
      </aside>

      <section class="content">
        <div id="loading" class="loading">加载中...</div>
        <div id="empty" class="empty hidden">暂无报告，可手动触发一次任务生成。</div>

        <article id="reportView" class="report-view hidden">
          <div class="report-meta">
            <span id="reportDate"></span>
            <span id="reportCreated"></span>
          </div>
          <h2 id="reportTitle"></h2>
          <p id="reportSummary" class="summary"></p>

          <div id="marketCards" class="market-cards"></div>

          <div id="reportContent" class="markdown-body"></div>
        </article>
      </section>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
