# www.luca0527.art 站点配置（系统 nginx，仅供参考）
# 生产环境实际使用宝塔面板 nginx：
# /www/server/panel/vhost/nginx/www.luca0527.art.conf
# 见同目录 www.luca0527.art.bt.conf
# 哲学项目：/api /uploads /admin
# A股报告：/market
# 原有应用：/ （PM2 :3000）

server {
    listen 80;
    listen [::]:80;
    server_name www.luca0527.art;

    access_log /var/log/nginx/sse-index.access.log;
    error_log  /var/log/nginx/sse-index.error.log;

    client_max_body_size 10m;

    # A股每日分析报告
    location = /market {
        return 301 /market/;
    }

    location ^~ /market/ {
        proxy_pass http://127.0.0.1:3080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # 哲学 REST API
    location /api/ {
        add_header X-Philosophy-Proxy api always;
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 哲学家头像
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        proxy_set_header Host $host;
    }

    # 哲学管理后台
    location /admin/ {
        proxy_pass http://127.0.0.1:8081/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 /admin/;
    }

    # 原有应用（WordPress / PM2）
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}

# 裸域名跳转到 www
server {
    listen 80;
    listen [::]:80;
    server_name luca0527.art;

    return 301 http://www.luca0527.art$request_uri;
}
