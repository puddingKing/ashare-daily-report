
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    
    server_name www.luca0527.art;
    server_tokens off;
    keepalive_timeout 10;

    ssl_certificate /www/server/panel/vhost/nginx/certificates/www.luca0527.art_bundle.crt;
    ssl_certificate_key /www/server/panel/vhost/nginx/certificates/www.luca0527.art.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    index index.php index.html;

    # A股每日分析报告
    location = /market {
        return 301 /market/;
    }
    location ^~ /market/ {
        proxy_pass http://127.0.0.1:3080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
    }

    # Philosophy API & Admin (Docker)
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10m;
    }
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /admin {
        return 301 /admin/;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8081/admin/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # H5 静态站点
    location = /app {
        return 301 /app/;
    }
    location /app/ {
        alias /opt/philosophy/h5/;
        index index.html;
    }

    location /stock/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    #ERROR-PAGE-START  错误页配置，可以注释、删除或修改
    #ERROR-PAGE-END

    root /usr/local/lighthouse/softwares/wordpress;
    client_max_body_size 50m;
    #PHP-INFO-START  PHP引用配置，可以注释或修改
    include enable-php-83.conf;
    #PHP-INFO-END
    #REWRITE-START URL重写规则引用,修改后将导致面板设置的伪静态规则失效
    include /www/server/panel/vhost/rewrite/wordpress.local.conf;
    #REWRITE-END
        

    # 禁止访问的文件或目录
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README.md) {
       return 404;
    }

    location ~ \.well-known {
       allow all;
    }

    access_log  "/www/wwwlogs//www.luca0527.art.log";
    error_log  "/www/wwwlogs//www.luca0527.art.error.log";
}
