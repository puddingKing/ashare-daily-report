services:
  db:
    image: postgres:16-alpine
    container_name: ashare-postgres
    environment:
      POSTGRES_USER: ashare
      POSTGRES_PASSWORD: ashare
      POSTGRES_DB: ashare_report
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ashare -d ashare_report"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    container_name: ashare-daily-report
    ports:
      - "3080:3000"
    environment:
      PORT: 3000
      TZ: Asia/Shanghai
      CRON_SCHEDULE: "0 16 * * *"
      ENABLE_SCHEDULER: "true"
      DATABASE_URL: postgresql://ashare:ashare@db:5432/ashare_report
      CURSOR_API_KEY: ${CURSOR_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
